<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernando d'Ávila</title>

    <!-- CSS separado -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <main>
        <div id="home-placeholder"></div>
        <div id="experience-placeholder"></div>
        <div id="projects-placeholder"></div>
        <div id="skills-placeholder"></div>
        <div id="contact-placeholder"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        async function loadPartial(path, selector) {
            try {
                const res = await fetch(path);
                if (!res.ok) throw new Error(path + ' not found');
                const html = await res.text();
                document.querySelector(selector).innerHTML = html;
            } catch (e) {
                console.error(e);
            }
        }

        const partials = [
            { path: 'partials/nav.html', selector: '#nav-placeholder' },
            { path: 'partials/home.html', selector: '#home-placeholder' },
            { path: 'partials/experience.html', selector: '#experience-placeholder' },
            { path: 'partials/projects.html', selector: '#projects-placeholder' },
            { path: 'partials/skills.html', selector: '#skills-placeholder' },
            { path: 'partials/contact.html', selector: '#contact-placeholder' },
            { path: 'partials/footer.html', selector: '#footer-placeholder' }
        ];

        (async () => {
            await Promise.all(partials.map(p => loadPartial(p.path, p.selector)));
            initPageScripts();
        })();

        function initPageScripts() {
            const yearEl = document.getElementById('current-year');
            if (yearEl) yearEl.textContent = new Date().getFullYear();

            const sections = document.querySelectorAll('section');
            const navLinks = document.querySelectorAll('nav a');

            window.addEventListener('scroll', () => {
                let current = '';
                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    if (window.scrollY >= sectionTop - 200) {
                        current = section.getAttribute('id');
                    }
                });

                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === `#${current}`) {
                        link.classList.add('active');
                    }
                });
            });

            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (!target) return;
                    const offsetTop = target.offsetTop - 80;
                    window.scrollTo({ top: offsetTop, behavior: 'smooth' });
                });
            });

            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('visible');
                });
            }, observerOptions);

            document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
        }
    </script>
</body>
</html>
